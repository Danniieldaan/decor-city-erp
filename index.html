<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><title>Decor City ERP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={
  darkMode:'class',
  theme:{extend:{
    colors:{primary:{DEFAULT:'#2563eb',50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'},
      accent:{DEFAULT:'#8b5cf6',50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9'},
      success:{DEFAULT:'#16a34a',50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d'},
      warning:{DEFAULT:'#d97706',50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309'},
      destructive:{DEFAULT:'#dc2626',50:'#fef2f2',100:'#fee2e2',200:'#fecaca',300:'#fca5a5',400:'#f87171',500:'#ef4444',600:'#dc2626',700:'#b91c1c'},
      surface:{DEFAULT:'#ffffff',dark:'#0f172a'},
      muted:{DEFAULT:'#f8fafc',dark:'#1e293b'},
      border:{DEFAULT:'#e2e8f0',dark:'#334155'}
    },
    fontFamily:{sans:['Inter','system-ui','sans-serif']},
    borderRadius:{DEFAULT:'0.5rem'}
  }}
};
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--white:#fff;--bl:#2563eb;--bll:#e8f0fc;--gn:#16a34a;--gnl:#dcfce7;--rd:#dc2626;--rdl:#fee2e2;--or:#d97706;--txt:#0f172a;--txt2:#64748b;--txt3:#94a3b8;--bd:#e2e8f0;--bd2:#e2e8f0;--r:0.5rem;--f:'Inter',system-ui,sans-serif;--nav:#1e293b;--top:#2563eb;--bg:#f8fafc;--sf:#fff}
html{font-family:'Inter',system-ui,sans-serif}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#0f172a;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.dark body{background:#020617;color:#e2e8f0}
#wrap{display:flex;flex:1;overflow:hidden}
#main{flex:1;overflow-y:auto;background:#f8fafc}
.dark #main{background:#020617}
.hidden{display:none!important}
.empty{text-align:center;padding:2rem;color:#94a3b8;font-size:13px}

/* === MODERNIZED WRAPPER CLASSES === */

/* Page Headers */
.ph{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 1.25rem;height:3rem;display:flex;align-items:center;gap:0.625rem;flex-shrink:0}
.dark .ph{background:#0f172a;border-color:#334155}
.pt{font-size:1.125rem;font-weight:700}.ps{font-size:0.75rem;color:#94a3b8}.ptb{display:flex;gap:0.5rem;margin-left:auto}

/* Panels/Cards */
.pnl{background:#fff;border:1px solid #e2e8f0;border-radius:0.75rem;margin:0.75rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dark .pnl{background:#0f172a;border-color:#334155;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.pnlh{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:0.625rem 1rem;font-size:0.8rem;font-weight:700;color:#0f172a;display:flex;align-items:center;justify-content:space-between}
.dark .pnlh{background:#1e293b;border-color:#334155;color:#e2e8f0}

/* Action Bars */
.actb{background:#fff;border-bottom:1px solid #e2e8f0;padding:0.5rem 0.75rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.dark .actb{background:#0f172a;border-color:#334155}
.actb .sep{width:1px;height:1.5rem;background:#e2e8f0}
.dark .actb .sep{background:#334155}
.actb select,.actb button{font-size:0.75rem}
.actb .lbl{font-size:0.75rem;color:#94a3b8;font-weight:600}

/* Data Tables */
.dt{width:100%;border-collapse:collapse;font-size:0.8125rem}
.dt thead{background:#f1f5f9}
.dark .dt thead{background:#1e293b}
.dt thead th{padding:0.5rem 0.625rem;text-align:left;font-size:0.6875rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;border-right:1px solid #e2e8f0}
.dark .dt thead th{color:#94a3b8;border-color:#334155}
.dt thead th:last-child{border-right:none}
.dt tbody tr{border-bottom:1px solid #e2e8f0;transition:background .12s}
.dark .dt tbody tr{border-color:#1e293b}
.dt tbody tr:nth-child(even){background:#f8fafc}
.dark .dt tbody tr:nth-child(even){background:#0f172a}
.dt tbody tr:hover{background:#e8f0fc}
.dark .dt tbody tr:hover{background:rgba(37,99,235,.08)}
.dt tbody td{padding:0.5rem 0.625rem;vertical-align:middle;border-right:1px solid #e2e8f0}
.dark .dt tbody td{border-color:#1e293b}
.dt tbody td:last-child{border-right:none}
.dt tfoot td{padding:0.5rem 0.625rem;background:#f8fafc;font-weight:700;border-top:2px solid #e2e8f0}
.dark .dt tfoot td{background:#0f172a;border-color:#334155}

/* Form Tables */
.ft{width:100%;border-collapse:collapse}
.ft td{padding:0.25rem 0.375rem;vertical-align:middle}
.ft td.lb{text-align:right;white-space:nowrap;color:#64748b;font-size:0.8125rem;width:1%;padding-right:0.625rem;font-weight:500}
.dark .ft td.lb{color:#94a3b8}

/* Form Inputs */
.fi{flex:h;height:2.25rem;width:100%;border-radius:0.5rem;border:1px solid #e2e8f0;background:#fff;padding:0.375rem 0.625rem;font-size:0.8125rem;font-family:'Inter',system-ui,sans-serif;color:#0f172a;outline:none;transition:all .15s}
.dark .fi{background:#1e293b;border-color:#475569;color:#e2e8f0}
.fi:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.dark .fi:focus{box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.firo{display:flex;align-items:center;min-height:2rem;width:100%;border-radius:0.5rem;background:#f1f5f9;border:1px solid #e2e8f0;padding:0.375rem 0.625rem;font-size:0.8125rem;color:#94a3b8;line-height:1.4}
.dark .firo{background:#1e293b;border-color:#334155;color:#64748b}

/* Inline Input (for tables) */
.qi{height:1.75rem;border:1px solid #e2e8f0;border-radius:0.375rem;padding:0.25rem 0.375rem;font-size:0.75rem;font-family:'Inter',system-ui,sans-serif;width:100%;outline:none;background:#fff;color:#0f172a}
.dark .qi{background:#1e293b;border-color:#475569;color:#e2e8f0}
.qi:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}

/* Badges/Status Pills */
.sp{display:inline-flex;align-items:center;border-radius:9999px;padding:0.125rem 0.625rem;font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.sdr{background:#e2e8f0;color:#475569}.dark .sdr{background:#334155;color:#cbd5e1}
.ssn{background:#dbeafe;color:#1d4ed8}.dark .ssn{background:rgba(37,99,235,.15);color:#60a5fa}
.spr{background:#fed7aa;color:#9a3412}.dark .spr{background:rgba(217,119,6,.15);color:#fbbf24}
.sco{background:#dcfce7;color:#15803d}.dark .sco{background:rgba(22,163,74,.15);color:#4ade80}
.sin{background:#fae8ff;color:#86198f}.dark .sin{background:rgba(168,85,247,.15);color:#c084fc}
.ssm{background:#e0f2fe;color:#0369a1}.dark .ssm{background:rgba(14,165,233,.15);color:#38bdf8}
.smd{background:#fae8ff;color:#86198f}.dark .smd{background:rgba(168,85,247,.15);color:#c084fc}
.slg{background:#ede9fe;color:#6d28d9}.dark .slg{background:rgba(139,92,246,.15);color:#a78bfa}

/* Money */
.money{font-family:'JetBrains Mono','Courier New',monospace;font-weight:600;text-align:right}
.mg{color:#16a34a}.dark .mg{color:#4ade80}
.mr{color:#dc2626}.dark .mr{color:#f87171}
.mb{color:#2563eb}.dark .mb{color:#60a5fa}

/* Code Inline */
code{font-size:0.75rem;background:#f1f5f9;padding:0.0625rem 0.375rem;border-radius:0.25rem;color:#2563eb;font-family:'JetBrains Mono','Courier New',monospace}
.dark code{background:rgba(37,99,235,.1);color:#60a5fa}

/* Dropdowns */
.ddw{position:relative;display:inline-block}
.ddm{position:fixed;z-index:9999;background:#fff;border:1px solid #d1d5db;border-radius:0.5rem;min-width:155px;box-shadow:0 6px 20px rgba(0,0,0,.1);padding:0.25rem 0;display:none}
.dark .ddm{background:#1e293b;border-color:#475569;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.ddm.show{display:block}
.ddm a{display:block;padding:0.375rem 0.875rem;font-size:0.75rem;color:#374151;text-decoration:none;cursor:pointer;white-space:nowrap}
.dark .ddm a{color:#cbd5e1}
.ddm a:hover{background:#f3f4f6;color:#111827}
.dark .ddm a:hover{background:rgba(255,255,255,.05);color:#f1f5f9}
.ddm .sep{height:1px;background:#e5e7eb;margin:0.25rem 0}
.dark .ddm .sep{background:#334155}

/* View Dropdowns */
.vddw{position:relative;display:inline-block;vertical-align:middle}
.vddm{position:fixed;z-index:9999;background:#fff;border:1px solid #2563eb;border-radius:0.5rem;min-width:200px;box-shadow:0 6px 20px rgba(0,0,0,.1);padding:0.375rem 0;display:none}
.dark .vddm{background:#1e293b;border-color:#60a5fa}
.vddm.show{display:block}
.vddm input{display:block;width:calc(100% - 16px);margin:0 8px 6px;padding:0.375rem 0.5rem;border:1px solid #e2e8f0;border-radius:0.375rem;font-size:0.75rem;font-family:'Inter',system-ui,sans-serif;outline:none;background:#fff;color:#0f172a}
.dark .vddm input{background:#0f172a;border-color:#475569;color:#e2e8f0}
.vddm input:focus{border-color:#2563eb}
.vddm a{display:block;padding:0.3125rem 0.875rem;font-size:0.75rem;color:#374151;text-decoration:none;cursor:pointer;white-space:nowrap}
.dark .vddm a{color:#cbd5e1}
.vddm a:hover{background:#f3f4f6;color:#111827}
.dark .vddm a:hover{background:rgba(255,255,255,.05);color:#f1f5f9}
.vddm a.sel{background:#e8f0fc;color:#2563eb;font-weight:600}
.dark .vddm a.sel{background:rgba(37,99,235,.15);color:#60a5fa}
.vlbl{font-size:0.75rem;color:#64748b;font-weight:500;margin-right:0.25rem;vertical-align:middle}
.dark .vlbl{color:#94a3b8}

/* Checkbox */
.cb{width:1rem;height:1rem;cursor:pointer;accent-color:#2563eb}

/* Customer Search Dropdown */
.qcddm{position:absolute;z-index:50;top:100%;left:0;right:0;background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.08);display:none}
.dark .qcddm{background:#1e293b;border-color:#475569}
.qcddm a{display:block;padding:0.25rem 0.625rem;font-size:0.75rem;color:#0f172a;text-decoration:none;cursor:pointer;line-height:1.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dark .qcddm a{color:#e2e8f0}
.qcddm a:hover{background:#e8f0fc}
.dark .qcddm a:hover{background:rgba(37,99,235,.1)}
.qcddm .addnew{display:block;text-align:center;color:#2563eb;font-weight:600;border-top:1px solid #e2e8f0;padding:0.25rem 0.625rem;cursor:pointer;line-height:1.8}
.dark .qcddm .addnew{color:#60a5fa;border-color:#334155}
.qcddm .addnew:hover{background:#e8f0fc}
.dark .qcddm .addnew:hover{background:rgba(37,99,235,.1)}

/* Search Input */
.srch{position:relative}
.srch input{padding-right:1.5rem}
.srch:after{content:'\2315';position:absolute;right:0.5rem;top:0.5rem;color:#94a3b8;font-size:0.875rem}

/* Dashboard Cards */
.kbar{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;padding:1rem;border-bottom:1px solid #e2e8f0}
.dark .kbar{border-color:#334155}
.kb{background:#fff;border:1px solid #e2e8f0;border-radius:0.75rem;padding:0.875rem 1rem;border-top:4px solid #2563eb;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s}
.dark .kb{background:#0f172a;border-color:#334155;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.kb:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-2px)}
.dark .kb:hover{box-shadow:0 4px 12px rgba(0,0,0,.3)}
.kb.g{border-top-color:#16a34a}.kb.o{border-top-color:#d97706}.kb.r{border-top-color:#dc2626}
.kl{font-size:0.625rem;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.1875rem}
.dark .kl{color:#64748b}
.kv{font-size:1.25rem;font-weight:800;letter-spacing:-0.03em}
.ks{font-size:0.625rem;color:#94a3b8;margin-top:0.125rem}
.dark .ks{color:#64748b}

/* Sidebar */
.si.on{border-left-color:#8b5cf6;background:rgba(139,92,246,.08);color:#fff;font-weight:600}
.dark .si.on{background:rgba(139,92,246,.12)}

/* Quick View Grid */
.qvg{display:grid;grid-template-columns:repeat(4,1fr)}
.qvc{background:#fff;border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:1.5rem 0.875rem;text-align:center;cursor:pointer;transition:all .15s}
.dark .qvc{background:#0f172a;border-color:#334155}
.qvc:hover{background:#dbeafe;transform:scale(1.02)}
.dark .qvc:hover{background:rgba(37,99,235,.12)}
.qvc.on{background:#e8f0fc}
.dark .qvc.on{background:rgba(37,99,235,.15)}
.qvci{font-size:1.5rem;margin-bottom:0.375rem}
.qvct{font-size:0.8125rem;font-weight:700;color:#2563eb;margin-bottom:0.125rem}
.dark .qvct{color:#60a5fa}
.qvcs{font-size:0.6875rem;color:#94a3b8;line-height:1.4}
.dark .qvcs{color:#64748b}

/* Payroll Cards */
.pw{background:#fff;border:1px solid #e2e8f0;border-radius:0.75rem;margin-bottom:0.625rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dark .pw{background:#0f172a;border-color:#334155}
.pwh{background:#1e293b;padding:0.5rem 0.875rem;display:flex;align-items:center;justify-content:space-between}
.dark .pwh{background:#0f172a}
.pwn{color:#fff;font-weight:700;font-size:0.8125rem}
.pwt{color:#4ade80;font-weight:800;font-size:0.9375rem}

/* Total Rows */
.trow{display:flex;justify-content:space-between;align-items:center;padding:0.25rem 0;font-size:0.8125rem}
.trow.grand{font-size:0.875rem;font-weight:800;border-top:2px solid #e2e8f0;padding-top:0.5rem;margin-top:0.1875rem}
.dark .trow.grand{border-color:#334155}

/* Production Cards */
.pcard{background:#fff;border:1px solid #e2e8f0;border-radius:0.75rem;margin-bottom:0.625rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dark .pcard{background:#0f172a;border-color:#334155}
.pch{background:#1e293b;padding:0.4375rem 0.75rem;display:flex;align-items:center;justify-content:space-between}
.dark .pch{background:#0f172a}
.pcn{color:#fff;font-weight:600;font-size:0.75rem}
.pct{color:#4ade80;font-size:0.8125rem;font-weight:700}

/* Production Stage Rows */
.stage-row{display:flex;align-items:center;gap:0.375rem;padding:0.375rem 0.75rem;border-bottom:1px solid #e2e8f0;font-size:0.75rem}
.dark .stage-row{border-color:#334155}
.stage-row:last-child{border-bottom:none}
.stage-name{width:130px;font-weight:600;color:#64748b}
.dark .stage-name{color:#94a3b8}
.stage-artisans{flex:1}
.stage-artisans select{width:100%;padding:0.1875rem 0.3125rem;border:1px solid #e2e8f0;border-radius:0.375rem;font-size:0.6875rem;background:#fff;color:#0f172a}
.dark .stage-artisans select{background:#1e293b;border-color:#475569;color:#e2e8f0}
.stage-comm{width:80px;text-align:right;color:#16a34a;font-weight:600}
.dark .stage-comm{color:#4ade80}
.stage-date{width:110px}
.stage-date input{width:100%;padding:0.1875rem 0.3125rem;border:1px solid #e2e8f0;border-radius:0.375rem;font-size:0.6875rem;background:#fff;color:#0f172a}
.dark .stage-date input{background:#1e293b;border-color:#475569;color:#e2e8f0}
.stage-status{width:70px;text-align:center}

/* Artisan Multi-Select */
.art-msel{position:relative;display:inline-block;width:100%}
.art-msel-trig{min-height:1.5rem;border:1px solid #e2e8f0;border-radius:0.5rem;background:#fff;cursor:pointer;display:flex;flex-wrap:wrap;gap:2px;padding:2px 18px 2px 3px;font-size:0.625rem;position:relative}
.dark .art-msel-trig{background:#1e293b;border-color:#475569}
.art-msel-trig:hover{border-color:#2563eb}
.art-msel-dd{position:fixed;z-index:10000;background:#fff;border:1px solid #2563eb;border-radius:0.5rem;max-height:160px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.15);display:none;min-width:130px}
.dark .art-msel-dd{background:#1e293b;border-color:#60a5fa}
.art-msel-dd.open{display:block}
.art-msel-dd a{display:flex;align-items:center;gap:0.3125rem;padding:0.3125rem 0.625rem;font-size:0.75rem;color:#0f172a;cursor:pointer;white-space:nowrap}
.dark .art-msel-dd a{color:#e2e8f0}
.art-msel-dd a:hover{background:#e8f0fc}
.dark .art-msel-dd a:hover{background:rgba(37,99,235,.1)}
.art-msel-dd a .ick{width:14px;height:14px;border:1px solid #e2e8f0;border-radius:0.25rem;display:inline-flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.dark .art-msel-dd a .ick{border-color:#475569}
.art-msel-dd a.sel .ick{background:#2563eb;border-color:#2563eb;color:#fff}
.art-msel-ph{color:#94a3b8;font-size:0.5625rem;padding:0.125rem 0.1875rem}
.art-tag{background:#e8f0fc;color:#2563eb;border-radius:0.25rem;padding:0.0625rem 0.25rem;font-size:0.5625rem;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:2px;line-height:1.3}
.dark .art-tag{background:rgba(37,99,235,.2);color:#60a5fa}
.art-tag-x{cursor:pointer;font-size:0.625rem;opacity:.6;line-height:1}.art-tag-x:hover{opacity:1}

/* Stage Date Input */
input.stg-date{width:100%;font-size:0.5625rem;padding:0.0625rem 0.125rem;border:1px solid #e2e8f0;border-radius:0.5rem;color:#0f172a;margin-top:0.125rem;box-sizing:border-box;background:#fff}
.dark input.stg-date{background:#1e293b;border-color:#475569;color:#e2e8f0}

/* Progress bar */
.prog{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.dark .prog{background:#334155}
.prog-f{height:100%;background:#2563eb;border-radius:2px;transition:width .3s ease}

/* Print styles */
.print-frame{font-family:'Times New Roman',serif;color:#000;background:#fff;padding:0}
@media print{body *{visibility:hidden}.print-frame,.print-frame *{visibility:visible}.print-frame{position:fixed;left:0;top:0;width:100%;padding:20px;z-index:9999}}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.animate-fadeIn{animation:fadeIn .2s ease-out}
.animate-slideUp{animation:slideUp .2s ease-out}
.animate-slideDown{animation:slideDown .15s ease-out}
</style></head><body>
<header id="tnav" class="h-11 bg-white dark:bg-slate-900 border-b border-border dark:border-slate-700 flex items-stretch px-1 flex-shrink-0 shadow-sm z-40">
  <div class="flex items-center px-4 text-base font-extrabold text-primary dark:text-primary-400 border-r border-border dark:border-slate-700 tracking-tight"><span class="text-destructive">Decor</span>City</div>
  <nav class="flex items-stretch">

function calcPrice(w,h,ft){
  w=parseFloat(w)||0;h=parseFloat(h)||0;
  if(w<=0||h<=0)return 0;
  if(w>h){var t=w;w=h;h=t;}
  var area=w*h;
  var mx=(w===h)?SQ_MATRIX:RECT_MATRIX;
  var lo=mx[0],hi=mx[mx.length-1];
  if(area<=mx[0].area){lo=mx[0];hi=(mx.length>1)?mx[1]:mx[0];}
  else if(area>=mx[mx.length-1].area){lo=mx[mx.length-2];hi=mx[mx.length-1];}
  else{for(var i=0;i<mx.length-1;i++){if(area>=mx[i].area&&area<=mx[i+1].area){lo=mx[i];hi=mx[i+1];break;}}}
  var f=((hi.area-lo.area)>0)?(area-lo.area)/(hi.area-lo.area):0;
  var canvas=Math.round(lo.canvas+f*(hi.canvas-lo.canvas));
  var framed=Math.round(lo.framed+f*(hi.framed-lo.framed));
  var glass=Math.round(lo.glass+f*(hi.glass-lo.glass));
  var type=(ft||'').toLowerCase().trim();
  if(type==='stretched canvas')return canvas;
  if(type==='canvas and frame')return framed;
  if(type==='glass frame'||type==='floating frame')return glass;
  return 0;
}
function iPrice(it){
  if(!it||!it.qty)return 0;
  var unitPrice = (it.price != null && it.price !== '') ? Number(it.price) : (it.ft ? calcPrice(it.w, it.h, it.ft) : 0);
  return unitPrice * it.qty;
}
function sTier(w,h){
  var W=w||0,H=h||0;
  if(W<60&&H<90)return'Small';
  if(W>=60&&W<=70&&H>=90&&H<=140)return'Medium';
  if(W>=80&&H>=160)return'Large';
  var A=W*H;return A<=5400?'Small':A<=9800?'Medium':'Large';
}

function wkRange(){

}
function isWk(ds){var r=wkRange(),d=new Date(ds);return d>=r.mo&&d<=r.su;}
function getWeekStart(dateStr){
  var d=new Date(dateStr);
  var day=d.getDay();
  var diff=d.getDate()-(day===0?6:day-1);
  var mon=new Date(d);mon.setDate(diff);
  return mon.toISOString().split('T')[0];
}
function getWeekEnd(monStr){
  var d=new Date(monStr);d.setDate(d.getDate()+6);

function formatWeekLabel(monStr){
  var s=new Date(monStr);var e=new Date(monStr);e.setDate(e.getDate()+6);

}

function nextWeek(monStr){var d=new Date(monStr);d.setDate(d.getDate()+7);return d.toISOString().split('T')[0];}

function getArtisanMonthEarnings(artisan,yearMonth){
  // yearMonth format: 'YYYY-MM'
  var total=0;
  DB.productions.forEach(function(p){
    p.stages.forEach(function(st){
      if(!st.artisans||!st.date)return;
      var eff=st.dateOverride||st.date;
      if(!eff)return;
      if(eff.substring(0,7)!==yearMonth)return;
      var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
      if(artList.indexOf(artisan)===-1)return;
      var share=Math.floor(st.comm/(artList.length||1));
      total+=share;
    });
  });
  // Add outstanding items for this month that were paid
  DB.outstanding.forEach(function(o){
    if(o.artisan===artisan&&o.paid&&o.paidDate&&o.paidDate.substring(0,7)===yearMonth){
      total+=o.amount;
    }
  });
  return total;
}

function qT(qid){
  var its=DB.items.filter(function(i){return i.qid===qid;});
  var sub=its.reduce(function(s,i){return s+iPrice(i)*(1-(i.disc||0)/100);},0);
  var q=DB.quotes.find(function(x){return x.id===qid;})||{};
  var discPct=q.disc||0;
  var discAmt=sub*discPct/100;
  var grand=sub-discAmt,dep=0;
  var rcpts=DB.receipts.filter(function(r){return r.qid===qid;});
  dep=rcpts.reduce(function(s,r){return s+r.amount;},0);
  var bal=grand-dep;
  return{sub:sub,disc:discAmt,grand:grand,dep:dep,bal:bal};
}

function cSelAll(chk){
  document.querySelectorAll('#ctbl .crow').forEach(function(r){
    var cb=r.querySelector('.cb');
    if(cb&&r.style.display!=='none')cb.checked=chk;
  });
  custSel=chk?DB.customers.map(function(c){return c.id;}):[];
  updCustBar();
}
function cSelRow(id,chk){
  if(chk&&custSel.indexOf(id)===-1)custSel.push(id);
  else if(!chk)custSel=custSel.filter(function(x){return x!==id;});
  updCustBar();
}
function updCustBar(){
  var n=custSel.length;
  document.getElementById('cselcnt').textContent=n+' selected';
  var els=['cbdel','cbact','cbinact'];
  els.forEach(function(id){document.getElementById(id).disabled=n===0;});
}
function bulkCustDel(){
  if(!custSel.length)return;
  if(!confirm('Delete '+custSel.length+' selected customers? Invoices and receipts will be removed. Production records will be kept.'))return;
  custSel.forEach(function(id){
    var qids=DB.quotes.filter(function(q){return q.cid===id;}).map(function(q){return q.id;});
    DB.items=DB.items.filter(function(i){return qids.indexOf(i.qid)===-1;});
    DB.receipts=DB.receipts.filter(function(r){return r.cid!==id;});
    DB.quotes=DB.quotes.filter(function(q){return q.cid!==id;});
    DB.customers=DB.customers.filter(function(c){return c.id!==id;});
  });
  custSel=[];saveDB();go('customers');
}
function bulkCustActive(active){
  if(!custSel.length)return;
  custSel.forEach(function(id){
    var c=DB.customers.find(function(x){return x.id===id;});
    if(c)c.active=active;
  });
  custSel=[];saveDB();go('customers');
}
function fCust(q){
  var ql=q.toLowerCase();
  document.querySelectorAll('.crow').forEach(function(r){
    var match=r.dataset.name.includes(ql)||r.dataset.cat.toLowerCase().includes(ql);
    r.style.display=match?'':'none';
  });
  cvApply();
}
function fCustCat(cat){
  document.querySelectorAll('.crow').forEach(function(r){
    r.style.display=!cat||r.dataset.cat===cat?'':'none';
  });
  cvApply();
}
var cvKey='all';
function cvddToggle(){
  var el=document.getElementById('cvddm');
  var sh=el.classList.contains('show');
  clrDDs();
  if(!sh){
    el.classList.add('show');
    document.getElementById('cvfilt').value='';
    document.querySelectorAll('#cvddm a[data-key]').forEach(function(a){a.style.display='block';});
    var trig=document.getElementById('cvtrig');
    if(trig){
      var rect=trig.getBoundingClientRect();
      var mh=el.offsetHeight||200;
      var spaceBelow=window.innerHeight-rect.bottom;
      el.style.left='auto';
      el.style.right=(window.innerWidth-rect.right)+'px';
      if(spaceBelow<mh&&rect.top>mh)el.style.top=(rect.top-mh-4)+'px';
      else el.style.top=(rect.bottom+4)+'px';
    }
    setTimeout(function(){document.getElementById('cvfilt').focus();},50);
  }
}
function cvddFilter(q){
  var ql=q.toLowerCase();
  document.querySelectorAll('#cvddm a[data-key]').forEach(function(a){
    a.style.display=a.textContent.toLowerCase().includes(ql)?'':'none';
  });
}
function cvddSel(el,key){
  document.querySelectorAll('#cvddm a[data-key]').forEach(function(a){a.classList.remove('sel');});
  el.classList.add('sel');
  document.getElementById('cvtrig').textContent=el.textContent+' ▾';
  cvKey=key;
  clrDDs();
  cvApply();
}
function cvApply(){
  var today=localDate();
  var curM=today.slice(0,7);
  var boughtToday={},boughtMonth={};
  DB.quotes.forEach(function(q){
    if(q.date===today)boughtToday[q.cid]=true;
    if(q.date&&q.date.slice(0,7)===curM)boughtMonth[q.cid]=true;
  });
  DB.receipts.forEach(function(r){
    if(r.date===today)boughtToday[r.cid]=true;
    if(r.date&&r.date.slice(0,7)===curM)boughtMonth[r.cid]=true;
  });
  document.querySelectorAll('.crow').forEach(function(r){
    var cid=+(r.dataset.id||0);
    var show=true;
    if(cvKey==='bought_today'){
      show=!!boughtToday[cid];
    }else if(cvKey==='bought_month'){
      show=!!boughtMonth[cid];
    }
    r.style.display=show?'':'none';
  });
}
function toggleDD(id,trigger){
  var el=document.getElementById(id);if(!el)return;
  var sh=el.classList.contains('show');
  clrDDs();
  if(!sh){
    el.classList.add('show');
    if(trigger){
      var rect=trigger.getBoundingClientRect();
      var mh=el.offsetHeight||200;
      var spaceBelow=window.innerHeight-rect.bottom;
      var rEdge=window.innerWidth-rect.right;
      el.style.left='auto';
      el.style.right=rEdge+'px';
      if(spaceBelow<mh&&rect.top>mh){
        el.style.top=(rect.top-mh-4)+'px';
      }else{
        el.style.top=(rect.bottom+4)+'px';
      }
    }
  }
}
function clrDDs(e){
  if(e){
    var p=e.target.closest('.ddm')||e.target.closest('.ddw')||e.target.closest('.vddw')||e.target.closest('.vddm')||e.target.closest('.art-msel');
    if(p)return;
  }
  document.querySelectorAll('.ddm.show,.vddm.show').forEach(function(el){el.classList.remove('show');});
  document.querySelectorAll('.art-msel-dd.open').forEach(function(el){el.classList.remove('open');});
}

function iSelAll(chk){
  document.querySelectorAll('#qbody .qrow').forEach(function(r){
    var cb=r.querySelector('.cb');
    if(cb&&r.style.display!=='none')cb.checked=chk;
  });
  invSel=chk?DB.quotes.map(function(q){return q.id;}):[];
  updInvBar();
}
function iSelRow(id,chk){
  if(chk&&invSel.indexOf(id)===-1)invSel.push(id);
  else if(!chk)invSel=invSel.filter(function(x){return x!==id;});
  updInvBar();
}
function updInvBar(){
  var n=invSel.length;
  document.getElementById('iselcnt').textContent=n+' selected';
  document.getElementById('ibdel').disabled=n===0;
}
function bulkInvDel(){
  if(!invSel.length)return;
  if(!confirm('Delete '+invSel.length+' selected invoices? Items and receipts will be removed. Production records will be kept.'))return;
  var affectedCids=[];
  invSel.forEach(function(id){
    var q=DB.quotes.find(function(x){return x.id===id;});
    if(q&&affectedCids.indexOf(q.cid)===-1)affectedCids.push(q.cid);
    DB.items=DB.items.filter(function(i){return i.qid!==id;});
    DB.receipts=DB.receipts.filter(function(r){return r.qid!==id;});
  });
  DB.quotes=DB.quotes.filter(function(q){return invSel.indexOf(q.id)===-1;});
  affectedCids.forEach(function(cid){updateCustBal(cid);});
  invSel=[];saveDB();go('invoices');
}
function fQt(q){
  var ql=q.toLowerCase();
  document.querySelectorAll('.qrow').forEach(function(r){
    r.style.display=r.dataset.cust.includes(ql)?'':'none';
  });
  qvApply();
}
var qvKey='all';
function vddToggle(){
  var el=document.getElementById('qvddm');
  var sh=el.classList.contains('show');
  clrDDs();
  if(!sh){
    el.classList.add('show');
    document.getElementById('qvfilt').value='';
    document.querySelectorAll('#qvddm a[data-key]').forEach(function(a){a.style.display='block';});
    var trig=document.getElementById('qvtrig');
    if(trig){
      var rect=trig.getBoundingClientRect();
      var mh=el.offsetHeight||260;
      var spaceBelow=window.innerHeight-rect.bottom;
      el.style.left='auto';
      el.style.right=(window.innerWidth-rect.right)+'px';
      if(spaceBelow<mh&&rect.top>mh)el.style.top=(rect.top-mh-4)+'px';
      else el.style.top=(rect.bottom+4)+'px';
    }
    setTimeout(function(){document.getElementById('qvfilt').focus();},50);
  }
}
function vddFilter(q){
  var ql=q.toLowerCase();
  document.querySelectorAll('#qvddm a[data-key]').forEach(function(a){
    a.style.display=a.textContent.toLowerCase().includes(ql)?'':'none';
  });
}
function vddSel(el,key){
  document.querySelectorAll('#qvddm a[data-key]').forEach(function(a){a.classList.remove('sel');});
  el.classList.add('sel');
  document.getElementById('qvtrig').textContent=el.textContent+' ▾';
  qvKey=key;
  clrDDs();
  qvApply();
}
function qvApply(){
  var today=localDate();
  var curM=today.slice(0,7);
  document.querySelectorAll('.qrow').forEach(function(r){
    var show=true;
    if(qvKey==='today'){
      show=r.dataset.date===today;
    }else if(qvKey==='month'){
      show=r.dataset.date&&r.dataset.date.slice(0,7)===curM;
    }else if(qvKey==='exptoday'){
      show=r.dataset.exp===today;
    }else if(qvKey==='completed'){
      show=r.dataset.stat==='Completed';
    }else if(qvKey==='invoiced'){
      // "Paid" filter: show invoices where balance is zero
      var qid=+r.dataset.id;
      show=qid&&qT(qid).bal<=0;
    }
    r.style.display=show?'':'none';
  });
}

  if(eid&&eid!=='null'){
    Object.assign(DB.quotes.find(function(q){return q.id===eid;}),d);
    DB.items=DB.items.filter(function(i){return i.qid!==eid;});

  }else if(LI.length){

    d.stat='Issued';
    DB.quotes.push({id:newId,...d});
    LI.forEach(function(it){DB.items.push({...it,id:nid('i'),qid:newId});});

function sendProd(qid){
  var q=DB.quotes.find(function(x){return x.id===qid;});if(!q)return;
  var its=DB.items.filter(function(i){return i.qid===qid;});
  var frameIts=its.filter(function(it){return isFrameItem(it.ft);});
  if(!frameIts.length){alert('No frame items on this invoice to send to production.');return;}

  // Duplicate guard: skip items that already have a production job
  var created=0;
  frameIts.forEach(function(it){
    var existing=DB.productions.find(function(p){return p.jid===it.id;});
    if(existing)return;

    var stages=(FRAME_STAGES[it.ft]||FT_STAGES[it.ft]||[]).map(function(sk){
      var tier=sTier(it.w,it.h);
      return{sk:sk,artisans:'',comm:gComm(tier,sk),date:null,dateOverride:null,week:null};
    });
    DB.productions.push({id:nid('p'),jid:it.id,qid:qid,status:'active',stages:stages});
    created++;
  });

  if(created===0){alert('Production jobs already exist for all frame items on this invoice.');return;}
  q.stat='In Progress';
  saveDB();go('production');
}

function isFrameInv(qid){
  return DB.items.some(function(i){return i.qid===qid&&isFrameItem(i.ft);});
}
function hasProd(qid){
  return DB.productions.some(function(p){return p.qid===qid;});
}
function calcInvStat(qid){
  var t=qT(qid);
  var prods=DB.productions.filter(function(p){return p.qid===qid;});
  var hasFrame=prods.length>0;
  var allDone=hasFrame&&prods.every(function(p){return p.stages.every(function(s){return s.date;});});
  if(t.bal<=0){
    // Paid in full
    if(!hasFrame||allDone)return'Completed';
    return'In Progress'; // paid but production still running
  }
  // Still owes money
  if(hasFrame)return'In Progress';
  return'Issued';
}

function rFullAlloc(i){
  if(!rAllocData[i])return;
  var receiptAmt=parseFloat(document.getElementById('ramt').value)||0;
  // Fill this invoice's full balance
  rAllocData[i].alloc=rAllocData[i].bal;
  var inp=document.getElementById('ralloc_'+i);
  if(inp)inp.value=rAllocData[i].bal;
  // Auto-fill remaining to other unallocated invoices if only 1 remains
  var totalAlloc=0;
  rAllocData.forEach(function(d,idx){if(idx!==i)totalAlloc+=d.alloc;});
  var remaining=receiptAmt-rAllocData[i].alloc;
  if(remaining<0)remaining=0;
  // Find unallocated invoices (excluding current)
  var unallocated=[];
  rAllocData.forEach(function(d,idx){
    if(idx!==i&&d.alloc===0)unallocated.push(idx);
  });
  // Auto-fill if only 1 other invoice is unallocated
  if(unallocated.length===1){
    var idx=unallocated[0];
    var fill=Math.min(remaining,rAllocData[idx].bal);
    rAllocData[idx].alloc=fill;
    var fillInp=document.getElementById('ralloc_'+idx);
    if(fillInp)fillInp.value=fill;
  }
  rCalcAlloc();
}
function rAutoMatchOldest(){
  var receiptAmt=parseFloat(document.getElementById('ramt').value)||0;
  if(receiptAmt<=0){alert('Enter a receipt amount first');return;}
  // Clear all allocations
  rAllocData.forEach(function(d,i){
    d.alloc=0;
    var inp=document.getElementById('ralloc_'+i);
    if(inp)inp.value=0;
  });
  // Sort by date ascending (oldest first)
  var sorted=rAllocData.map(function(d,i){return{idx:i,bal:d.bal};}).sort(function(a,b){
    var qa=DB.quotes.find(function(q){return q.id===rAllocData[a.idx].qid;});
    var qb=DB.quotes.find(function(q){return q.id===rAllocData[b.idx].qid;});
    return(qa?qa.date:'').localeCompare(qb?qb.date:'');
  });
  // Allocate to oldest first
  var remaining=receiptAmt;
  sorted.forEach(function(item){
    if(remaining<=0)return;
    var alloc=Math.min(remaining,rAllocData[item.idx].bal);
    rAllocData[item.idx].alloc=alloc;
    var inp=document.getElementById('ralloc_'+item.idx);
    if(inp)inp.value=alloc;
    remaining-=alloc;
  });
  rCalcAlloc();
}

function rOnAllocInput(i){
  if(!rAllocData[i])return;
  var inp=document.getElementById('ralloc_'+i);
  if(!inp)return;
  var v=parseFloat(inp.value)||0;
  if(v<0){v=0;inp.value=0;}
  if(v>rAllocData[i].bal){v=rAllocData[i].bal;inp.value=v;}
  rAllocData[i].alloc=v;
  rCalcAlloc();
}

function rCalcAlloc(){
  var receiptAmt=parseFloat(document.getElementById('ramt').value)||0;
  var isAuto=document.getElementById('ramt').dataset.auto==='1';
  // Auto-allocate for single-invoice customer
  if(isAuto&&rAllocData.length===1){
    var alloc=Math.min(receiptAmt,rAllocData[0].bal);
    rAllocData[0].alloc=alloc;
    var tr=document.getElementById('rrow_0');
    if(tr)tr.style.background=alloc>0?'#f0f7ff':'';
  }
  var totalAlloc=0;
  rAllocData.forEach(function(d){totalAlloc+=d.alloc;});
  // Update row highlights (for multi-invoice case)
  if(!isAuto){
    rAllocData.forEach(function(d,i){
      var tr=document.getElementById('rrow_'+i);
      if(tr){tr.style.background=d.alloc>0?'#f0f7ff':'';}
    });
  }
  rUpdSum();
  // Validate
  var err='';
  if(receiptAmt>0&&totalAlloc>receiptAmt){
    err='Total allocation ('+fmt(totalAlloc)+') exceeds receipt amount ('+fmt(receiptAmt)+').';
  }
  rAllocData.forEach(function(d,i){
    if(d.alloc>d.bal){
      err='Invoice '+invNum(d.qid)+' allocation ('+fmt(d.alloc)+') exceeds amount due ('+fmt(d.bal)+').';
    }
  });
  rAllocData.forEach(function(d){
    if(d.alloc<0){
      err='Negative allocation values are not allowed.';
    }
  });
  rUpdErr(err);
  rUpdBtns();
}

function rUpdSum(){
  var totalAlloc=0;
  rAllocData.forEach(function(d){totalAlloc+=d.alloc;});
  var el=document.getElementById('ralloc_sum');
  if(el){el.textContent=totalAlloc>0?'Total Allocated: '+fmt(totalAlloc):'';}
}

function rUpdErr(msg){
  var el=document.getElementById('ralloc_err');
  if(!el)return;
  if(msg){el.textContent=msg;el.style.display='block';}
  else{el.textContent='';el.style.display='none';}
}

function rUpdBtns(){
  var receiptAmt=parseFloat(document.getElementById('ramt').value)||0;
  var totalAlloc=0;
  var hasErr=false;
  rAllocData.forEach(function(d){
    totalAlloc+=d.alloc;
    if(d.alloc<0||d.alloc>d.bal)hasErr=true;
  });
  if(receiptAmt>0&&totalAlloc>receiptAmt)hasErr=true;
  var ids=['rbtn_save','rbtn_new','rbtn_print','rbtn_email'];
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.disabled=hasErr;
  });
}

function saveR(action){
  var dd=document.getElementById('rc');var cid=+dd.value;
  if(!cid){alert('Select a customer');return;}
  var receiptAmount=parseFloat(document.getElementById('ramt').value)||0;
  if(receiptAmount<=0){alert('Enter a receipt amount');return;}
  var method=document.querySelector('input[name="rmet"]:checked');
  var met=method?method.value:'Cash';
  var date=document.getElementById('rdate').value;
  var ref=document.getElementById('rref')?document.getElementById('rref').value:'';
  var note=document.getElementById('rnote').value;
  var desc=document.getElementById('rdesc').value;
  var bank=document.getElementById('rbank').value;
  var combinedNote=[desc,note].filter(Boolean).join(' \u2014 ');

  // Gather allocations from rAllocData (works for both auto and manual)
  var allocations=[];
  var totalAlloc=0;
  rAllocData.forEach(function(d){
    var amt=d.alloc||0;
    // For manual mode, also read from input field
    if(document.getElementById('ramt').dataset.auto!=='1'){
      var inp=document.getElementById('ralloc_'+rAllocData.indexOf(d));
      amt=inp?parseFloat(inp.value)||0:amt;
    }
    if(amt>0){allocations.push({qid:d.qid,amount:Math.min(amt,d.bal)});totalAlloc+=amt;}
  });

  // Validation
  if(totalAlloc<=0){alert('Enter an allocation amount for at least one invoice');return;}
  if(totalAlloc>receiptAmount){alert('Total allocation ('+fmt(totalAlloc)+') cannot exceed receipt amount ('+fmt(receiptAmount)+')');return;}
  rAllocData.forEach(function(d){
    if(d.alloc>d.bal){alert('Invoice '+invNum(d.qid)+' allocation exceeds amount due');return;}
  });

  // Unallocated credit (customer credit)
  var unallocated=Math.max(0,receiptAmount-totalAlloc);

  // Create receipt records and allocations
  var createdIds=[];
  allocations.forEach(function(alloc){
    var rId=nid('r');
    var receiptNote=combinedNote;
    if(unallocated>0&&alloc===allocations[allocations.length-1]){
      receiptNote+=(receiptNote?' | ':'')+'Unallocated credit: '+fmt(unallocated);
    }
    DB.receipts.push({id:rId,qid:alloc.qid,cid:cid,amount:alloc.amount,method:met,date:date,ref:ref||'',note:receiptNote,bank:bank,unallocated:0});
    createdIds.push(rId);

    // Update invoice status based on new payment totals
    var q=DB.quotes.find(function(x){return x.id===alloc.qid;});
    if(q){
      q.stat=calcInvStat(alloc.qid);
    }
  });

  // If there's unallocated credit, create a credit receipt
  if(unallocated>0){
    var cId=nid('r');
    DB.receipts.push({id:cId,qid:0,cid:cid,amount:unallocated,method:met,date:date,ref:ref||'',note:'Unallocated customer credit',bank:bank,unallocated:unallocated});
    createdIds.push(cId);
  }

  updateCustBal(cid);
  saveDB();

  if(action==='new'){pgRF(null);return;}
  if(action==='print'&&createdIds.length){printR(createdIds[createdIds.length-1]);}
  if(action==='email'&&createdIds.length){emailR(createdIds[createdIds.length-1]);}
  go('receipts');
}

function npUpdPreview(){
  var el=document.getElementById('np_preview');
  if(!el)return;
  // Count total individual jobs
  var totalJobs=0;
  npLI.forEach(function(it){if(it.ft)totalJobs+=Math.max(1,it.qty||1);});
  var html='<div class="text-xs font-bold mb-1.5">Job Summary ('+totalJobs+' individual jobs)</div>';

  npLI.forEach(function(it){
    if(!it.ft)return;
    var ft=it.ft;
    var dim=(it.w||'?')+'\u00d7'+(it.h||'?')+' '+(it.unit||'cm');
    var stages=FRAME_STAGES[it.ft]||[];
    var count=Math.max(1,it.qty||1);
    for(var q=0;q<count;q++){

function artToggleArtisan(pid,sk,name){
  var p=DB.productions.find(function(x){return x.id===pid;});if(!p)return;
  var st=p.stages.find(function(x){return x.sk===sk;});if(!st)return;
  var arr=(st.artisans||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
  var idx=arr.indexOf(name);
  if(idx===-1){
    arr.push(name);
    // Stamp weekStart when first artisan is added to this stage
    if(!st.weekStart){
      st.weekStart=getWeekStart(localDate());
    }
  }
  else{arr.splice(idx,1);}
  st.artisans=arr.join(', ');
  saveDB();
  // Update tags in-place without full re-render
  var ddId='amd_'+pid+'_'+sk;
  var wrap=document.getElementById(ddId+'wrap');
  if(wrap){
    var trig=wrap.querySelector('.art-msel-trig');
    if(trig)trig.innerHTML=artTags(pid,sk,arr);
    var dd=document.getElementById(ddId);
    if(dd)dd.innerHTML=artOptions(pid,sk,arr);
  }
}

function markStageDone(pid,sk,dtId){
  var p=DB.productions.find(function(x){return x.id===pid;});if(!p)return;
  var st=p.stages.find(function(x){return x.sk===sk;});if(!st)return;
  // Validate: artisan must be selected before marking complete
  if(!st.artisans||!st.artisans.trim()){
    alert('Select an Artisan first before marking this stage as done.');
    return;
  }
  // Read date from the date picker input, fallback to today
  var selDate=localDate();
  if(dtId){
    var dtEl=document.getElementById(dtId);
    if(dtEl&&dtEl.value)selDate=dtEl.value;
  }
  st.date=selDate;
  var newWeek=getWeekStart(selDate);
  // If the week is already paid, route artisans' commissions to outstanding
  if(isWeekPaid(newWeek)&&st.artisans){
    var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
    var share=Math.floor(st.comm/(artList.length||1));
    var dim=(p.w||'?')+'x'+(p.h||'?')+(p.unit||'cm');
    artList.forEach(function(name){
      routeToOutstanding(name,share,sk,p.jobId||('#'+p.id),p.ft,dim,newWeek);
    });
  }
  st.weekStart=newWeek;
  var r=wkRange();var d=new Date(st.date);
  if(!(d>=r.mo&&d<=r.su))st.dateOverride=st.date;
  saveDB();pgProd();
}
function stgDateChange(pid,sk,newDate){
  var p=DB.productions.find(function(x){return x.id===pid;});if(!p)return;
  var st=p.stages.find(function(x){return x.sk===sk;});if(!st)return;
  if(!newDate)return;
  var newWeek=getWeekStart(newDate);
  var oldWeek=st.weekStart;
  st.weekStart=newWeek;
  // If stage was already marked done, update the date too
  if(st.date){st.date=newDate;}
  var r=wkRange();var d=new Date(newDate);
  if(!(d>=r.mo&&d<=r.su))st.dateOverride=newDate;
  // If the new week is already paid, route artisans' commissions to outstanding
  if(isWeekPaid(newWeek)&&st.artisans){
    var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
    var share=Math.floor(st.comm/(artList.length||1));
    var dim=(p.w||'?')+'x'+(p.h||'?')+(p.unit||'cm');
    artList.forEach(function(name){
      routeToOutstanding(name,share,sk,p.jobId||('#'+p.id),p.ft,dim,newWeek);
    });
  }
  saveDB();
}

function toggleStage(pid,sk){
  var p=DB.productions.find(function(x){return x.id===pid;});if(!p)return;
  var st=p.stages.find(function(x){return x.sk===sk;});if(!st)return;
  if(st.date){
    st.date=null;st.dateOverride=null;st.weekStart=null;
  }else{
    // Validate: artisan must be selected before marking complete
    if(!st.artisans||!st.artisans.trim()){
      alert('Select an Artisan first before marking this stage as done.');
      return;
    }
    st.date=localDate();
    st.weekStart=getWeekStart(st.date);
    var r=wkRange();var d=new Date(st.date);
    if(!(d>=r.mo&&d<=r.su))st.dateOverride=st.date;
  }
  saveDB();pgProd();
}

function cplArtChg(cb){

  var checked=0;
  checks.forEach(function(c){if(c.checked)checked++;});
  var perArtisan=checked>0?Math.floor(comm/checked):0;
  var el=document.querySelector('.cplcomm[data-sk="'+sk+'"]');

function saveCplArtisans(pid){
  var p=DB.productions.find(function(x){return x.id===pid;});if(!p)return;
  var stageWeek=p.stages.length>0?getWeekStart(p.stages[0].dateOverride||p.stages[0].date||p.date):null;
  p.stages.forEach(function(st){
    var oldArtList=(st.artisans||'').split(',').map(function(x){return x.trim();}).filter(Boolean);
    var checks=document.querySelectorAll('.cplart[data-pid="'+pid+'"][data-sk="'+st.sk+'"]');
    var newArtList=[];
    checks.forEach(function(cb){
      if(cb.checked)newArtList.push(cb.getAttribute('data-name'));
    });
    // Find removed and added artisans
    var removed=oldArtList.filter(function(a){return newArtList.indexOf(a)===-1;});
    var added=newArtList.filter(function(a){return oldArtList.indexOf(a)===-1;});
    // Update artisan list
    st.artisans=newArtList.join(', ');
    // Handle outstanding entries for paid weeks
    var workDate=st.dateOverride||st.date;
    if(workDate){
      var stWeek=getWeekStart(workDate);
      if(isWeekPaid(stWeek)){
        var perArtisan=newArtList.length>0?Math.floor(st.comm/newArtList.length):0;
        var dim=(p.w||'?')+'x'+(p.h||'?')+(p.unit||'cm');
        // Remove outstanding for artisans who were removed from this stage
        removed.forEach(function(name){
          DB.outstanding=DB.outstanding.filter(function(o){
            return !(o.artisan===name&&o.stage===st.sk&&(o.jobId===(p.jobId||'#'+p.id)));
          });
        });
        // Add outstanding for artisans who were added to this stage
        added.forEach(function(name){
          routeToOutstanding(name,perArtisan,st.sk,p.jobId||('#'+p.id),p.ft,dim,stWeek);
        });
      }
    }
  });
  saveDB();closeM();pgProdLog();
}

var payWeek=null;
function pgPay(){
  if(!payWeek)payWeek=thisWeekStart();
  var weekEnd=getWeekEnd(payWeek);
  var isPaid=isWeekPaid(payWeek);
  var isCurrent=(payWeek===thisWeekStart());
  // Collect stage data for selected week
  var artData={};
  DB.productions.forEach(function(p){
    p.stages.forEach(function(st){
      if(!st.artisans)return;
      var workDate=st.dateOverride||st.date;
      if(!workDate)return;
      var wk=getWeekStart(workDate);
      if(wk!==payWeek)return;
      var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
      var share=Math.floor(st.comm/(artList.length||1));
      artList.forEach(function(name){
        if(!artData[name])artData[name]={stageTotals:{},totalEarned:0,jobs:[]};
        artData[name].stageTotals[st.sk]=(artData[name].stageTotals[st.sk]||0)+share;
        artData[name].totalEarned+=share;
        var existing=artData[name].jobs.find(function(j){return j.pid===p.id&&j.sk===st.sk;});
        if(!existing){
          artData[name].jobs.push({pid:p.id,sk:st.sk,jobId:p.jobId||'#'+p.id,ft:p.ft,w:p.w,h:p.h,comm:st.comm,share:share});

// ============ WORKERS ============
function pgWorkers(){
  var curWeek=thisWeekStart();
  var curMonth=new Date().toISOString().substring(0,7);
  var curYear=new Date().getFullYear();
  var allNames=ARTISANS.slice();
  // Build per-artisan data
  var artData={};
  allNames.forEach(function(n){artData[n]={weekly:0,monthly:0,outstanding:0};});
  // Calculate weekly earnings (current week)
  DB.productions.forEach(function(p){
    p.stages.forEach(function(st){
      if(!st.artisans)return;
      var workDate=st.dateOverride||st.date;
      if(!workDate)return;
      var wk=getWeekStart(workDate);
      var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
      var share=Math.floor(st.comm/(artList.length||1));
      artList.forEach(function(name){
        if(!artData[name])artData[name]={weekly:0,monthly:0,outstanding:0};
        if(wk===curWeek)artData[name].weekly+=share;
        if(workDate.substring(0,7)===curMonth)artData[name].monthly+=share;
      });
    });
  });
  // Outstanding totals
  DB.outstanding.filter(function(o){return !o.paid;}).forEach(function(o){
    if(!artData[o.artisan])artData[o.artisan]={weekly:0,monthly:0,outstanding:0};
    artData[o.artisan].outstanding+=o.amount;
  });
  // Get all weeks that have data
  var weeksWithPay={};
  DB.productions.forEach(function(p){
    p.stages.forEach(function(st){
      if(!st.artisans||!st.date)return;
      var wk=getWeekStart(st.dateOverride||st.date);
      weeksWithPay[wk]=true;
    });
  });
  var weeksList=Object.keys.weeksWithPay||[];
  set('<div class="ph"><div class="pt">Workers</div><div class="ps">Weekly &amp; monthly earnings overview</div></div>'+
  '<div class="pnl m-3"><div class="overflow-x-auto">'+
  '<table class="dt text-xs"><thead><tr>'+
    '<th>Worker Name</th>'+
    '<th>This Week (\u20a6)</th>'+
    '<th>This Month (\u20a6)</th>'+
    '<th>Outstanding (\u20a6)</th>'+
    '<th>Status</th>'+
  '</tr></thead><tbody>'+
  allNames.map(function(name){
    var d=artData[name]||{weekly:0,monthly:0,outstanding:0};
    var hasOutstanding=d.outstanding>0;
    return'<tr>'+
      '<td class="font-semibold">'+esc(name)+'</td>'+
      '<td class="money'+(d.weekly?' mg':'')+'">'+fmt(d.weekly)+'</td>'+
      '<td class="money'+(d.monthly?' mg':'')+'">'+fmt(d.monthly)+'</td>'+
      '<td class="money'+(hasOutstanding?' mr':'')+'">'+fmt(d.outstanding)+'</td>'+
      '<td>'+(hasOutstanding?'<span class="sp sdr">Has Outstanding</span>':'<span class="sp sco">Clear</span>')+'</td>'+
    '</tr>';
  }).join('')+
  '</tbody></table></div>'+
  // Monthly breakdown table
  '<div class="mt-4 p-3 bg-[#fafbfc] border border-border rounded-lg">'+
    '<div class="text-xs font-bold mb-2 text-primary">Monthly Earnings Summary</div>'+
    '<div class="text-xs text-slate-400 mb-2">'+new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'</div>'+
    '<table class="dt text-xs"><thead><tr>'+
      '<th>Worker</th><th>Earned This Month (\u20a6)</th><th>Outstanding (\u20a6)</th><th>Total Due (\u20a6)</th>'+
    '</tr></thead><tbody>'+
    allNames.map(function(name){
      var d=artData[name]||{weekly:0,monthly:0,outstanding:0};
      var totalDue=d.monthly+d.outstanding;
      return'<tr>'+
        '<td class="font-semibold">'+esc(name)+'</td>'+
        '<td class="money'+(d.monthly?' mg':'')+'">'+fmt(d.monthly)+'</td>'+
        '<td class="money'+(d.outstanding?' mr':'')+'">'+fmt(d.outstanding)+'</td>'+
        '<td class="money font-bold">'+fmt(totalDue)+'</td>'+
      '</tr>';
    }).join('')+

  '</div>'+
  '</div>');
}

// ============ PERFORMANCE ============
function pgPerformance(){
  var curMonth=new Date().toISOString().substring(0,7);
  var curYear=new Date().getFullYear();
  var allNames=ARTISANS.slice();
  // Build performance data per artisan
  var artPerf={};
  allNames.forEach(function(n){
    artPerf[n]={totalComm:0,monthComm:0,stagesCompleted:0,jobsWorked:new Set(),avgSpeed:0,speedSamples:0};
  });
  DB.productions.forEach(function(p){
    p.stages.forEach(function(st){
      if(!st.artisans||!st.date)return;
      var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
      var share=Math.floor(st.comm/(artList.length||1));
      artList.forEach(function(name){
        if(!artPerf[name])artPerf[name]={totalComm:0,monthComm:0,stagesCompleted:0,jobsWorked:new Set(),avgSpeed:0,speedSamples:0};
        artPerf[name].totalComm+=share;
        artPerf[name].stagesCompleted++;
        artPerf[name].jobsWorked.add(p.id);
        if(st.date&&st.date.substring(0,7)===curMonth)artPerf[name].monthComm+=share;
      });
    });
  });
  // Sort by total commission descending
  var sorted=allNames.slice().sort(function(a,b){return artPerf[b].totalComm-artPerf[a].totalComm;});
  // Monthly breakdown
  var months=[];
  for(var i=0;i<6;i++){
    var d=new Date();d.setMonth(d.getMonth()-i);
    months.push(d.toISOString().substring(0,7));
  }
  set('<div class="ph"><div class="pt">Artisan Performance</div><div class="ps">Commission & productivity metrics</div><div class="ptb"><button class="inline-flex items-center gap-1.5 rounded-lg text-xs font-semibold transition-all duration-150 active:scale-95 whitespace-nowrap cursor-pointer border font-sans border-border dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-muted dark:hover:bg-slate-700 bg-white dark:bg-slate-800 h-8 px-3" onclick="exportTableCSV(\'perftbl\',\'performance.csv\')">Export CSV</button></div></div>'+
  '<div class="pnl m-3">'+
  // Top performers card
  '<div class="grid gap-3 mb-4" style="grid-template-columns:repeat('+Math.min(3,allNames.length)+',1fr)">'+
  sorted.slice(0,3).map(function(name,i){
    var d=artPerf[name];
    var medal=['🥇','🥈','🥉'][i]||'';
    return'<div class="p-4 border border-border rounded-lg bg-[#fafbfc] text-center">'+
      '<div class="text-2xl mb-1">'+medal+'</div>'+
      '<div class="text-sm font-bold text-primary">'+esc(name)+'</div>'+
      '<div class="text-xl font-extrabold text-success my-1.5">'+fmt(d.totalComm)+'</div>'+
      '<div class="text-xs text-slate-400">Total Commission</div>'+
      '<div class="text-xs mt-1">'+d.stagesCompleted+' stages · '+d.jobsWorked.size+' jobs</div>'+
    '</div>';
  }).join('')+'</div>'+
  // Detailed table
  '<div class="overflow-x-auto">'+
  '<table class="dt text-xs" id="perftbl"><thead><tr>'+
    '<th>Rank</th><th>Artisan</th><th>Total Commission</th><th>This Month</th><th>Stages Done</th><th>Jobs</th><th>Avg per Stage</th>'+
  '</tr></thead><tbody>'+
  sorted.map(function(name,i){
    var d=artPerf[name];
    var avg=d.stagesCompleted>0?Math.floor(d.totalComm/d.stagesCompleted):0;
    return'<tr>'+
      '<td class="font-bold text-primary">#'+(i+1)+'</td>'+
      '<td class="font-semibold">'+esc(name)+'</td>'+
      '<td class="money mg font-bold">'+fmt(d.totalComm)+'</td>'+
      '<td class="money'+(d.monthComm?' mg':'')+'">'+fmt(d.monthComm)+'</td>'+
      '<td class="text-center">'+d.stagesCompleted+'</td>'+
      '<td class="text-center">'+d.jobsWorked.size+'</td>'+
      '<td class="money">'+fmt(avg)+'</td>'+
    '</tr>';
  }).join('')+'</tbody></table></div>'+
  // Monthly trend
  '<div class="mt-4 p-3 bg-[#fafbfc] border border-border rounded-lg">'+
    '<div class="text-xs font-bold mb-2 text-primary">Monthly Commission Trend</div>'+
    '<div class="overflow-x-auto"><table class="dt text-xs"><thead><tr><th>Artisan</th>'+
    months.map(function(m){return'<th>'+m+'</th>';}).join('')+
    '</tr></thead><tbody>'+
    sorted.map(function(name){
      return'<tr><td class="font-semibold">'+esc(name)+'</td>'+
      months.map(function(m){
        var mTotal=0;
        DB.productions.forEach(function(p){p.stages.forEach(function(st){
          if(!st.artisans||!st.date)return;
          var eff=st.dateOverride||st.date;
          if(!eff||eff.substring(0,7)!==m)return;
          var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
          if(artList.indexOf(name)===-1)return;
          mTotal+=Math.floor(st.comm/(artList.length||1));
        });});
        return'<td class="money'+(mTotal?' mg':'')+'">'+(mTotal?fmt(mTotal):'\u2014')+'</td>';
      }).join('')+'</tr>';
    }).join('')+'</tbody></table></div>'+
  '</div>'+
  '</div>');
}

// ============ REPORTS ============
function pgDaysOutstanding(){
  var today=new Date();
  var rows=[];
  DB.quotes.forEach(function(q){
    var t=qT(q.id);
    if(t.bal<=0)return; // skip fully paid
    var cu=DB.customers.find(function(c){return c.id===q.cid;});
    var issueDate=new Date(q.date);
    var days=Math.floor((today-issueDate)/(1000*60*60*24));
    rows.push({q:q,cu:cu,bal:t.bal,grand:t.grand,days:days});
  });
  rows.sort(function(a,b){return b.days-a.days;});
  var totalOwed=rows.reduce(function(s,r){return s+r.bal;},0);
  set('<div class="ph"><div class="pt">Customer Balances - Days Outstanding</div><div class="ps">'+rows.length+' unpaid invoices &mdash; '+fmt(totalOwed)+' total outstanding</div></div>'+
  '<div class="pnl m-3"><div class="overflow-x-auto">'+
  '<table class="dt text-xs"><thead><tr>'+
    '<th>Invoice</th><th>Customer</th><th>Date Issued</th><th>Days</th><th>Invoice Total</th><th>Amount Due</th><th>Status</th>'+
  '</tr></thead><tbody>'+
  (rows.length?rows.map(function(r){
    var ageClass='';var ageLabel='';
    if(r.days<=7){ageClass='spr';ageLabel='Current';}
    else if(r.days<=30){ageClass='ssn';ageLabel='30 days';}
    else if(r.days<=60){ageClass='sin';ageLabel='60 days';}
    else{ageClass='sr';ageLabel='90+ days';}
    return'<tr>'+
      '<td><code>'+invNum(r.q.id,r.q.date)+'</code></td>'+
      '<td class="font-semibold">'+(r.cu?esc(r.cu.name):'\u2014')+'</td>'+
      '<td>'+fd(r.q.date)+'</td>'+
      '<td class="text-center font-bold">'+r.days+'</td>'+
      '<td class="money">'+fmt(r.grand)+'</td>'+
      '<td class="money mr font-bold">'+fmt(r.bal)+'</td>'+
      '<td><span class="sp '+ageClass+'">'+ageLabel+'</span></td>'+
    '</tr>';
  }).join(''):'<tr><td colspan="7" class="empty">No outstanding invoices</td></tr>')+
  '</tbody></table></div></div>');
}

function renderCustTrans(){
  var sel=document.getElementById('ctrans_cust');
  var cid=sel?+sel.value:0;
  var body=document.getElementById('ctrans_body');
  if(!body)return;
  var transactions=[];
  // Gather invoices
  DB.quotes.forEach(function(q){
    if(cid&&q.cid!==cid)return;
    var cu=DB.customers.find(function(c){return c.id===q.cid;});
    var t=qT(q.id);
    transactions.push({type:'Invoice',date:q.date,cust:cu?cu.name:'\u2014',ref:invNum(q.id,q.date),amount:t.grand,balance:t.bal,note:q.stat});
  });
  // Gather receipts
  DB.receipts.forEach(function(r){
    if(cid&&r.cid!==cid)return;
    var cu=DB.customers.find(function(c){return c.id===r.cid;});
    transactions.push({type:'Receipt',date:r.date,cust:cu?cu.name:'\u2014',ref:'R-'+String(r.id).padStart(4,'0'),amount:-r.amount,balance:0,note:r.method});
  });
  transactions.sort(function(a,b){return b.date.localeCompare(a.date);});
  body.innerHTML=transactions.length?
    '<table class="dt text-xs"><thead><tr>'+
    '<th>Date</th><th>Type</th><th>Reference</th><th>Customer</th><th>Amount</th><th>Balance</th><th>Note</th>'+
    '</tr></thead><tbody>'+
    transactions.map(function(tr){
      var amtClass=tr.type==='Invoice'?'':'mg';
      return'<tr>'+
        '<td>'+fd(tr.date)+'</td>'+
        '<td><span class="sp '+(tr.type==='Invoice'?'ssn':'spr')+'">'+tr.type+'</span></td>'+
        '<td><code>'+tr.ref+'</code></td>'+
        '<td>'+esc(tr.cust)+'</td>'+
        '<td class="money '+amtClass+' font-semibold">'+fmt(Math.abs(tr.amount))+'</td>'+
        '<td class="money">'+(tr.type==='Invoice'?fmt(tr.balance):'\u2014')+'</td>'+
        '<td>'+tr.note+'</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table>':'<div class="empty">No transactions found</div>';
}

function saveEditUser(uid){
  var u=DB.users.find(function(x){return x.id===uid;});if(!u)return;
  var name=document.getElementById('euName').value.trim();
  var username=document.getElementById('euUser').value.trim();
  var password=document.getElementById('euPass').value;
  var role=document.getElementById('euRole').value;
  if(!name||!username){alert('Please fill all required fields');return;}
  // Check username conflict
  var conflict=DB.users.find(function(x){return x.username===username&&x.id!==uid;});
  if(conflict){alert('Username already exists');return;}
  u.name=name;u.username=username;
  if(password)u.password=btoa(password);
  u.role=role;
  if(role==='sales_rep'){
    u.repName=document.getElementById('euRep').value;
    u.grants=[];
    ['reports','production','payroll','settings','edit_receipts','delete_customers','delete_invoices','delete_receipts'].forEach(function(g){
      var el=document.getElementById('euG_'+g);
      if(el&&el.checked)u.grants.push(g);
    });
  }else{
    u.repName=null;u.grants=[];
  }
  // If editing current user, update session
  if(DB.currentUser&&DB.currentUser.id===uid){
    DB.currentUser=u;
    localStorage.setItem('dc_erp_currentUser',JSON.stringify(u));
    initApp();
  }
  saveDB();closeM();pgSettings();
}

  if(!confirm('Delete this user?'))return;

function printQPreview(id){

  var items=LI;
  var sub=items.reduce(function(s,i){return s+iPrice(i);},0);
  var sub2=items.reduce(function(s,i){return s+iPrice(i)*(1-(i.disc||0)/100);},0);
  var idisc=items.reduce(function(s,i){return s+iPrice(i)*((i.disc||0)/100);},0);
  var hdiscPct=+(document.getElementById('qdisc')||{}).value||0;
  var hdiscAmt=sub2*hdiscPct/100;
  var grand=sub2-hdiscAmt;
  var qid=id||('NEW-'+Date.now());
  showPrint(printQHTML(qid,cu,items,sub2,idisc,hdiscAmt,grand,document.getElementById('qmsg')?document.getElementById('qmsg').value:'',document.getElementById('qdate')?document.getElementById('qdate').value:'',document.getElementById('qexp')?document.getElementById('qexp').value:'',document.getElementById('qcdel')?document.getElementById('qcdel').value:''));
}

function exportCSV(filename,headers,rows){
  var csv=headers.join(',')+'\n';
  rows.forEach(function(row){
    csv+=row.map(function(cell){
      var val=String(cell==null?'':cell);
      if(val.indexOf(',')!==-1||val.indexOf('"')!==-1||val.indexOf('\n')!==-1){
        val='"'+val.replace(/"/g,'""')+'"';
      }
      return val;
    }).join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download=filename;
  link.click();
}
function exportTableCSV(tableId,filename){
  var table=document.getElementById(tableId);
  if(!table){alert('No table found');return;}
  var headers=[];
  var rows=[];
  table.querySelectorAll('thead th').forEach(function(th){headers.push(th.textContent.trim());});
  table.querySelectorAll('tbody tr').forEach(function(tr){
    if(tr.style.display==='none')return;
    var row=[];
    tr.querySelectorAll('td').forEach(function(td){row.push(td.textContent.trim());});
    if(row.length)rows.push(row);
  });
  exportCSV(filename,headers,rows);
}
function exportPayrollCSV(){
  var headers=['Worker Name'];
  STAGES.forEach(function(s){headers.push(s.label);});
  headers.push('Total Earned','Jobs');
  var rows=[];
  var allNames=ARTISANS.slice();
  allNames.forEach(function(name){
    var artData={};
    DB.productions.forEach(function(p){
      p.stages.forEach(function(st){
        if(!st.artisans)return;
        var workDate=st.dateOverride||st.date;
        if(!workDate)return;
        var wk=getWeekStart(workDate);
        if(wk!==payWeek)return;
        var artList=st.artisans.split(',').map(function(s){return s.trim();}).filter(Boolean);
        var share=Math.floor(st.comm/(artList.length||1));
        if(artList.indexOf(name)!==-1){
          if(!artData[st.sk])artData[st.sk]=0;
          artData[st.sk]+=share;
        }
      });
    });
    var row=[name];
    var total=0;
    var jobCount=0;
    STAGES.forEach(function(s){
      var val=artData[s.key]||0;
      row.push(val>0?val:'');
      total+=val;
    });
    row.push(total);
    rows.push(row);
  });
  exportCSV('payroll_'+payWeek+'.csv',headers,rows);
}

function delCust(id){
  var cu=DB.customers.find(function(c){return c.id===id;});if(!cu)return;
  if(!confirm('Delete customer "'+cu.name+'" and all their invoices, items, and receipts? Production records will be kept.'))return;
  var qids=DB.quotes.filter(function(q){return q.cid===id;}).map(function(q){return q.id;});
  DB.items=DB.items.filter(function(i){return qids.indexOf(i.qid)===-1;});
  DB.receipts=DB.receipts.filter(function(r){return r.cid!==id;});
  DB.quotes=DB.quotes.filter(function(q){return q.cid!==id;});
  DB.customers=DB.customers.filter(function(c){return c.id!==id;});
  saveDB();go('customers');
}
function delQuote(id){
  var q=DB.quotes.find(function(x){return x.id===id;});if(!q)return;
  var cu=DB.customers.find(function(c){return c.id===q.cid;});
  if(!confirm('Delete invoice '+invNum(id)+' for "'+(cu?cu.name:'')+'"?  Items and receipts will be removed. Production records will be kept.'))return;
  DB.items=DB.items.filter(function(i){return i.qid!==id;});
  DB.receipts=DB.receipts.filter(function(r){return r.qid!==id;});
  DB.quotes=DB.quotes.filter(function(x){return x.id!==id;});
  if(q.cid)updateCustBal(q.cid);
  saveDB();go('invoices');
}
function delReceipt(id){
  var r=DB.receipts.find(function(x){return x.id===id;});if(!r)return;
  if(!confirm('Delete receipt '+rcptNum(id)+'?'))return;
  DB.receipts=DB.receipts.filter(function(x){return x.id!==id;});
  updateCustBal(r.cid);
  saveDB();go('receipts');

function updateCustBal(cid){
  var c=DB.customers.find(function(x){return x.id===cid;});
  if(!c)return;
  var qs=DB.quotes.filter(function(q){return q.cid===cid;});
  var totalBal=0;
  var invoiceCount=0;
  var paidCount=0;
  qs.forEach(function(q){
    var t=qT(q.id);
    totalBal+=t.bal;
    invoiceCount++;
    if(t.bal<=0)paidCount++;
  });
  var oldBal=c.bal||0;
  c.bal=totalBal;
  // Flag if customer has credit but still owes (mismatch indicator)
  if(c.credit>0&&totalBal>c.credit){
    c.balWarning='Balance ('+fmt(totalBal)+') exceeds credit limit ('+fmt(c.credit)+')';
  }else{
    c.balWarning='';
  }
}

    users:DB.users,company:DB.company
  }));}catch(e){}
}
function loadDB(){
  try{
    var d=JSON.parse(localStorage.getItem('dc_erp_v2'));
    if(d){
      DB.quotes=d.quotes;DB.items=d.items;DB.productions=d.productions||[];
      DB.receipts=d.receipts||[];DB.customers=d.customers;DB.ids=d.ids;
      DB.payPeriods=d.payPeriods||[];
      DB.outstanding=d.outstanding||[];
      if(d.reps){REPS.length=0;d.reps.forEach(function(r){REPS.push(r);});}
      if(d.artisans){ARTISANS.length=0;d.artisans.forEach(function(a){ARTISANS.push(a);});}
      if(d.cm){Object.keys(d.cm).forEach(function(t){if(CM[t])Object.assign(CM[t],d.cm[t]);});}
      if(d.ftStages){Object.keys(d.ftStages).forEach(function(ft){FT_STAGES[ft]=d.ftStages[ft];});}
      if(d.frameStages){Object.keys(d.frameStages).forEach(function(ft){FRAME_STAGES[ft]=d.frameStages[ft];});}
      if(d.users){DB.users=d.users;}
      if(d.company){Object.assign(DB.company,d.company);}
    }
  }catch(e){}
}

function isAdmin(){

function hasPermission(action){
  var u=DB.currentUser;
  if(!u)return false;
  if(u.role==='admin')return true;
  // Base sales rep permissions
  var base=['dashboard','view_customers','add_customers','edit_customers','view_invoices','create_invoices','edit_invoices','view_receipts','create_receipts'];
  if(base.indexOf(action)!==-1)return true;
  // Check grants
  if(u.grants&&u.grants.indexOf(action)!==-1)return true;
  return false;
}

}
function logout(){
  DB.currentUser=null;
  localStorage.removeItem('dc_erp_currentUser');
  showLogin();
}
function checkSession(){
  try{
    var s=localStorage.getItem('dc_erp_currentUser');
    if(s){
      var u=JSON.parse(s);
      // Verify user still exists in DB
      var found=DB.users.find(function(x){return x.id===u.id;});
      if(found){
        DB.currentUser=found;
        return true;
      }
    }
  }catch(e){}
  return false;
}
function showLogin(){
  document.getElementById('tnav').style.display='none';
  document.getElementById('wrap').style.display='none';
  var loginDiv=document.getElementById('loginPage');
  if(!loginDiv){
    loginDiv=document.createElement('div');
    loginDiv.id='loginPage';
    document.body.appendChild(loginDiv);
  }
  loginDiv.className='fixed inset-0 bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-900 dark:to-slate-950 flex items-center justify-center z-[9999]';
  loginDiv.innerHTML='<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl dark:shadow-2xl dark:shadow-black/50 p-10 w-[380px] max-w-[90vw] border border-border dark:border-slate-700 animate-fadeIn">'+
    '<div class="text-center mb-8">'+
      '<div class="text-3xl font-extrabold tracking-tight"><span class="text-primary">Decor</span><span class="text-destructive">City</span></div>'+
      '<div class="text-xs text-slate-500 dark:text-slate-400 mt-1.5">'+esc(DB.company.tagline)+'</div>'+
    '</div>'+
    '<div id="loginErr" class="hidden bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800 text-destructive dark:text-red-400 p-2.5 rounded-lg text-xs mb-4"></div>'+
    '<div class="mb-4"><label class="text-xs font-semibold text-slate-700 dark:text-slate-300 block mb-1.5">Username</label>'+
      '<input id="loginUser" type="text" class="w-full h-11 px-3.5 rounded-xl border border-border dark:border-slate-600 bg-white dark:bg-slate-700 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all" placeholder="Enter username"/></div>'+
    '<div class="mb-5"><label class="text-xs font-semibold text-slate-700 dark:text-slate-300 block mb-1.5">Password</label>'+
      '<input id="loginPass" type="password" class="w-full h-11 px-3.5 rounded-xl border border-border dark:border-slate-600 bg-white dark:bg-slate-700 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all" placeholder="Enter password" onkeypress="if(event.key===\'Enter\')doLogin()"/></div>'+
    '<button onclick="doLogin()" class="w-full h-11 rounded-xl bg-primary hover:bg-primary/90 text-white font-semibold text-sm transition-all active:scale-[0.98] cursor-pointer border-0">Login</button>'+
    '<div class="text-center mt-4 text-[11px] text-slate-400 dark:text-slate-500">Default: admin / admin123</div>'+
  '</div>';
  document.getElementById('loginUser').focus();
}
function doLogin(){
  var un=document.getElementById('loginUser').value.trim();
  var pw=document.getElementById('loginPass').value;
  var errEl=document.getElementById('loginErr');
  if(!un||!pw){
    errEl.textContent='Please enter username and password';
    errEl.style.display='block';
    return;
  }
  var user=DB.users.find(function(u){return u.username===un&&u.password===btoa(pw);});
  if(!user){
    errEl.textContent='Invalid username or password';
    errEl.style.display='block';
    return;
  }
  login(user);
  document.getElementById('loginPage').style.display='none';
  document.getElementById('tnav').style.display='';
  document.getElementById('wrap').style.display='';
  initApp();
}
function showApp(){
  document.getElementById('tnav').style.display='';
  document.getElementById('wrap').style.display='';
  var lp=document.getElementById('loginPage');
  if(lp)lp.style.display='none';
  initApp();
}
function initApp(){
  // Update company name in header
  // Update user display
  var userEl=document.getElementById('userBadge');
  if(userEl&&DB.currentUser){
    userEl.textContent=DB.currentUser.name+' ('+DB.currentUser.role.replace('_',' ')+')';
  }
  // Filter top nav tabs based on permissions
  document.querySelectorAll('.ti').forEach(function(el){
    var pg=el.dataset.pg;
    var show=true;
    if(pg==='r_outstanding'&&!hasPermission('reports'))show=false;
    if(pg==='production'&&!hasPermission('production'))show=false;
    if(pg==='payroll'&&!hasPermission('payroll'))show=false;
    if(pg==='settings'&&!hasPermission('settings'))show=false;
    el.style.display=show?'':'none';
  });
  // Set dashboard as active
  document.querySelectorAll('.ti').forEach(function(e){
    e.classList.remove('on','text-primary','dark:text-primary-400','border-primary');
    if(e.dataset.pg==='dashboard')e.classList.add('on','text-primary','dark:text-primary-400','border-primary');
  });
  buildSB('dashboard');
  pgDash();
}
function go(pg){
  // Check permission before navigating
  if(pg==='r_outstanding'||pg==='r_sales'||pg==='r_transactions'){
    if(!hasPermission('reports')){alert('Access denied');return;}
  }
  if(pg==='production'||pg==='prod_new'||pg==='prod_all'||pg==='prod_log'||pg==='dates'){
    if(!hasPermission('production')){alert('Access denied');return;}
  }
  if(pg==='payroll'||pg==='workers'||pg==='performance'){
    if(!hasPermission('payroll')){alert('Access denied');return;}
  }
  if(pg==='settings'){
    if(!hasPermission('settings')){alert('Access denied');return;}
  }
  // Route to page
  var fns={dashboard:pgDash,customers:pgCusts,cust_new:pgCustF,invoices:pgInvoices,invoice_new:pgQF,receipts:pgRcpts,receipt_new:pgRF,production:pgProd,prod_new:pgNewProd,prod_all:pgAllJobs,prod_log:pgProdLog,dates:pgDates,payroll:pgPay,workers:pgWorkers,performance:pgPerformance,r_outstanding:pgDaysOutstanding,r_sales:pgSalesByCust,r_transactions:pgCustTrans,settings:pgSettings};
  if(fns[pg])fns[pg]();
    // Update active tab
  document.querySelectorAll('.ti').forEach(function(e){
    e.classList.remove('on','text-primary','dark:text-primary-400','border-primary');
    if(e.dataset.pg===pg){
      e.classList.add('on','text-primary','dark:text-primary-400','border-primary');
    }
  });
  // Update sidebar active item
  document.querySelectorAll('.si').forEach(function(e){
    e.classList.remove('on');
    // Convert page name back to sidebar item match
    var label=e.textContent.trim();
    var pgMap={dashboard:'Dashboard',customers:'Customer List',cust_new:'Add Customer',invoices:'All Invoices',invoice_new:'Process Invoice',receipts:'All Receipts',receipt_new:'New Receipt',production:'Active Jobs',prod_new:'New Job',prod_all:'All Jobs',prod_log:'Completed Jobs',dates:'Dates Log',payroll:'Weekly Payslips',workers:'Workers',performance:'Performance',r_outstanding:'Days Outstanding',r_sales:'Sales by Customer',r_transactions:'Customer Transactions',settings:'General Settings'};
    if(pgMap[pg]&&e.textContent.trim()===pgMap[pg]){
      e.classList.add('on');
    }
  });
}

function toggleDark(){
  var html=document.documentElement;
  html.classList.toggle('dark');
  localStorage.setItem('dc_dark',html.classList.contains('dark'));
}
// Init dark mode from localStorage
if(localStorage.getItem('dc_dark')==='true'){document.documentElement.classList.add('dark');}

// Migrate existing stages: stamp weekStart for stages that have artisans but no weekStart
DB.productions.forEach(function(p){
  p.stages.forEach(function(st){
    if(st.artisans&&!st.weekStart){
      // Use stage date if available, otherwise use job date or today
      var refDate=st.date||st.dateOverride||p.date||localDate();
      st.weekStart=getWeekStart(refDate);
    }
  });
});
saveDB();

document.getElementById('hd').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
// Check for existing session
if(checkSession()){
  showApp();
}else{
  showLogin();
}
</script></body></html>
